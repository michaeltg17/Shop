services:
  shop-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: shop-api:latest
    container_name: shop-api
    ports:
      - "5001:8080"
    depends_on:
      shop-db:
        condition: service_healthy
    restart: unless-stopped

  shop-db:
    image: postgres:17-alpine
    container_name: shop-db
    environment:
      POSTGRES_USER: shop
      POSTGRES_PASSWORD: shoppass
      POSTGRES_DB: shop
    ports:
      - "5432:5432"
    volumes:
      - shop-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shop"]
      interval: 3s
      timeout: 3s
      retries: 5

volumes:
  shop-data:
