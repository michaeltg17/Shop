name: cd

on:
  workflow_run:
    workflows:
      - "ci"
    types:
      - completed
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag'
        required: false
        default: 'latest'

jobs:
  deploy-dev:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    environment:
      name: dev
      url: https://dev.shop.statikk.mooo.com
    runs-on: ubuntu-latest
    steps:
      - name: Deploy dev
        run: |
          set -e
          TAG=${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.event.workflow_run.head_sha }}
          TAG=${TAG:0:7}
          BODY="{\"environment\":\"dev\",\"tag\":\"${TAG}\"}"
          SIGNATURE=$(echo -n "$BODY" | openssl dgst -sha256 -hmac "${{ secrets.WEBHOOK_SECRET }}" | awk '{print $2}')
          curl -sf --connect-timeout 10 --max-time 60 \
            -u "deploy:${{ secrets.DEPLOY_PASSWORD }}" \
            -H "X-Hub-Signature-256: sha256=${SIGNATURE}" \
            -H "Content-Type: application/json" \
            -d "$BODY" \
            -w "\nHTTP_CODE: %{http_code}\n" \
            https://statikk.mooo.com/deploy-shop

  deploy-qa:
    needs: deploy-dev
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    environment:
      name: qa
      url: https://qa.shop.statikk.mooo.com
    runs-on: ubuntu-latest
    steps:
      - name: Deploy qa
        run: |
          set -e
          TAG=${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.event.workflow_run.head_sha }}
          TAG=${TAG:0:7}
          BODY="{\"environment\":\"qa\",\"tag\":\"${TAG}\"}"
          SIGNATURE=$(echo -n "$BODY" | openssl dgst -sha256 -hmac "${{ secrets.WEBHOOK_SECRET }}" | awk '{print $2}')
          curl -sf --connect-timeout 10 --max-time 60 \
            -u "deploy:${{ secrets.DEPLOY_PASSWORD }}" \
            -H "X-Hub-Signature-256: sha256=${SIGNATURE}" \
            -H "Content-Type: application/json" \
            -d "$BODY" \
            -w "\nHTTP_CODE: %{http_code}\n" \
            https://statikk.mooo.com/deploy-shop

  deploy-prod:
    needs: deploy-qa
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    environment:
      name: prod
      url: https://shop.statikk.mooo.com
    runs-on: ubuntu-latest
    steps:
      - name: Deploy prod
        run: |
          set -e
          TAG=${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.event.workflow_run.head_sha }}
          TAG=${TAG:0:7}
          BODY="{\"environment\":\"prod\",\"tag\":\"${TAG}\"}"
          SIGNATURE=$(echo -n "$BODY" | openssl dgst -sha256 -hmac "${{ secrets.WEBHOOK_SECRET }}" | awk '{print $2}')
          curl -sf --connect-timeout 10 --max-time 60 \
            -u "deploy:${{ secrets.DEPLOY_PASSWORD }}" \
            -H "X-Hub-Signature-256: sha256=${SIGNATURE}" \
            -H "Content-Type: application/json" \
            -d "$BODY" \
            -w "\nHTTP_CODE: %{http_code}\n" \
            https://statikk.mooo.com/deploy-shop
